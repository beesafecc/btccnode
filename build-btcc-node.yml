name: Build BTCC Node

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git build-essential libtool autotools-dev automake pkg-config \
            bsdmainutils python3 libevent-dev libboost-dev libsqlite3-dev \
            libzmq3-dev ca-certificates

      - name: Clone Bitcoin-Classic
        run: |
          git clone --depth=1 https://github.com/Marcus-Vane/Bitcoin-Classic.git btcc
          cd btcc
          git log --oneline -1

      - name: Build
        working-directory: btcc
        run: |
          ./autogen.sh
          ./configure \
            --without-gui \
            --disable-wallet \
            --disable-tests \
            --disable-fuzz \
            --disable-fuzz-binary \
            --disable-bench \
            --with-zmq \
            CXXFLAGS="-O2 -g0"
          make -j$(nproc)
          strip src/bitcoind src/bitcoin-cli

      - name: Package binaries
        run: |
          mkdir -p dist
          cp btcc/src/bitcoind dist/
          cp btcc/src/bitcoin-cli dist/
          cd dist
          tar -czf btcc-node-linux-amd64.tar.gz bitcoind bitcoin-cli
          sha256sum btcc-node-linux-amd64.tar.gz > btcc-node-linux-amd64.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: btcc-node-linux-amd64
          path: |
            dist/btcc-node-linux-amd64.tar.gz
            dist/btcc-node-linux-amd64.tar.gz.sha256
          retention-days: 90

      - name: Delete old latest release
        run: |
          gh release delete latest --yes || true
          gh api -X DELETE repos/${{ github.repository }}/git/refs/tags/latest || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create latest release
        uses: softprops/action-gh-release@v3.0.1
        with:
          tag_name: latest
          name: "BTCC Node (latest)"
          make_latest: true
          files: |
            dist/btcc-node-linux-amd64.tar.gz
            dist/btcc-node-linux-amd64.tar.gz.sha256
          body: |
            BTCC Node binaries compiled from Bitcoin-Classic (latest main)
            - Platform: linux/amd64
            - Built on: ubuntu-24.04
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
